# spec:

apiVersion: apps/v1
kind: Deployment
metadata:
  name: colorado-sales-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: colorado-sales
  template:
    metadata:
      labels:
        app: colorado-sales
    spec:
      containers:
      - name: colorado-sales-container
        image: colorado_motor_vechile
        imagePullPolicy: Never
        ports:
        - containerPort: 8501
        volumeMounts:
        - name: kube-config
          mountPath: /root/.kube
          readOnly: true

      volumes:
      - name: kube-config
        hostPath:
          path: /home/pranuth/.kube
          type: Directory
